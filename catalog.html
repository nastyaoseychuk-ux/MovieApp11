<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Каталог</title>
</head>
<body>
    <div id="header-placeholder"></div>

    <script>
        // Динамічне завантаження хедера
        fetch("header.html")
            .then(res => res.text())
            .then(data => {
                document.getElementById("header-placeholder").innerHTML = data;
            })
            .catch(err => console.error("Помилка завантаження меню:", err));
    </script>

    <div class="navigation-wrapper" style="padding: 20px 50px 0;">
        <div id="back-button-container"></div>
        <h1 id="title"></h1>
    </div>

    <main style="padding: 0 50px 60px;">
        <div id="movies" class="movies-container2"></div>
    </main>

    <script src="script.js"></script>
</body>
</html>
