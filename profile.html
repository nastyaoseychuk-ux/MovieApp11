<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Мій Профіль</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="header-placeholder"></div>
    <script>
        // Динамічне завантаження хедера (один виклик)
        fetch("header.html")
            .then(res => res.text())
            .then(data => {
                document.getElementById("header-placeholder").innerHTML = data;
            })
            .catch(err => console.error("Помилка завантаження меню:", err));
    </script>

    <div class="details-wrapper">
        <div id="favorites-tabs" class="profile-tabs" style="margin:20px 0; display:flex; gap:30px;">
            <div class="tab">
                <button id="fav-movies-btn" class="btn">Мої збережені фільми</button>
            </div>
            <div class="tab">
                <button id="fav-tv-btn" class="btn">Мої збережені серіали</button>
            </div>
            <div class="tab">
                <button id="fav-cartoons-btn" class="btn">Мої збережені мультфільми</button>
            </div>
        </div>
        <div id="favorite-movies" class="movies-container1">
            </div>
    </div>

    <div id="authModal" class="modal">
    <div class="modal-content">
        <span class="close-modal">&times;</span>
        <div id="authForms">
            <div id="loginForm">
                <h2>Вхід</h2>
                <input type="email" id="loginEmail" placeholder="Email" required>
                <input type="password" id="loginPass" placeholder="Пароль" required>
                <button class="btn-details" onclick="handleLogin()">Увійти</button>
                <p>Немає акаунту? <a href="#" onclick="toggleAuth('reg')">Зареєструватися</a></p>
            </div>
            <div id="regForm" style="display: none;">
                <h2>Реєстрація</h2>
                <input type="text" id="regName" placeholder="Ім'я" required>
                <input type="email" id="regEmail" placeholder="Email" required>
                <input type="password" id="regPass" placeholder="Пароль" required>
                <button class="btn-details" onclick="handleRegister()">Створити акаунт</button>
                <p>Вже є акаунт? <a href="#" onclick="toggleAuth('login')">Увійти</a></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
