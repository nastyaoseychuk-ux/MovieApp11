<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Деталі — MovieApp</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="details-wrapper">
        <div id="details-content" class="details-card">
            <div class="loader">Завантаження інформації...</div>
        </div>
    </main>

    <div id="authModal" class="modal">
    <div class="modal-content">
        <span class="close-modal">&times;</span>
        <div id="authForms">
            <div id="loginForm">
                <h2>Вхід</h2>
                <input type="email" id="loginEmail" placeholder="Email" required>
                <input type="password" id="loginPass" placeholder="Пароль" required>
                <button class="btn-details" onclick="handleLogin()">Увійти</button>
                <p>Немає акаунту? <a href="#" onclick="toggleAuth('reg')">Зареєструватися</a></p>
            </div>
            <div id="regForm" style="display: none;">
                <h2>Реєстрація</h2>
                <input type="text" id="regName" placeholder="Ім'я" required>
                <input type="email" id="regEmail" placeholder="Email" required>
                <input type="password" id="regPass" placeholder="Пароль" required>
                <button class="btn-details" onclick="handleRegister()">Створити акаунт</button>
                <p>Вже є акаунт? <a href="#" onclick="toggleAuth('login')">Увійти</a></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Динамічне завантаження хедера
            fetch("header.html")
                .then(res => res.text())
                .then(data => {
                    document.getElementById("header-placeholder").innerHTML = data;
                    // Синхронізація auth UI після завантаження хедера
                    initHeaderObserver();
                })
                .catch(err => console.error("Помилка завантаження меню:", err));
            
            // Завантажити деталі фільму
            loadMovieDetails();
        });
    </script>
</body>
</html>
